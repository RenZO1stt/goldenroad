<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
      }
      .header {
        background-color: black;
        width: 100vw;
        height: 10vh;

        display: flex;
        justify-content: center;
        align-items: center;
        position: sticky;
      }

      a {
        color: white;
        text-decoration: none;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS",
          sans-serif;
        padding: 0.3rem 0.95rem;
        box-sizing: border-box;
      }

      .a1 {
        border-right: 1px white solid;
      }

      .backgroundopen {
        width: 35vw;
        height: 73vh;
        align-items: center;
        margin: 0 auto;
        overflow-y: auto;
        margin-top: 9vh;
        border-radius: 1.5rem;
        box-shadow: 0 0 10px gray;
        scrollbar-width: none;
      }
      .Addopen {
        display: inline-block;
        box-sizing: border-box;
        border: none;
        background-color: blue;
        color: white;
        border-radius: 16px;
        width: 5vw;
        height: 5vh;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS",
          sans-serif;
        font-size: 1rem;
         margin-left: .3vw;
       
      }

      .Addopen1 {
        display: inline-block;
        box-sizing: border-box;
        border: none;
        background-color: red;
        color: white;
        border-radius: 16px;
        width: 2.5vw;
        height: 5vh;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS",
          sans-serif;
        font-size: 1rem;
         margin-left: .4vw;
         font-weight: bold;
         align-items: center;
       
      }

      .Addopen:hover {
        background-color: darkblue;
      }

      .Addopen1:hover {
        background-color: darkred;
      }
      .containeropen {
        background-color: whitesmoke;
        width: 31vw;
        height: 51vh;
        margin: 0 auto;
        margin-top: 1.25rem;
        align-items: center;
        border-radius: 1.5rem;
        box-sizing: border-box;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .containeropen2 {
        display: flex;
        background-color: whitesmoke;
        width: 31.25vw;
        height: 6vh;
        margin: 0 auto;
        margin-top: 1.25rem;
        margin-left: 2rem;
        align-items: center;
        border-radius: 1rem;
        box-sizing: border-box;
        overflow-y: hidden;
        scrollbar-width: none;
      }

      .text {
        display: flex;
        justify-content: center;
        margin: 0 2vw;
        font-family: monospace;
        font-size: 1.1rem;
        margin-top: 2.2vh;
      }

      .componentbaropen {
        height: 5vh;
        width: auto;
        background-color: rgb(228, 227, 227);
        margin: 7.5px 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
        font-family: monospace;
        font-size: 1rem;
        box-shadow: 0 0 2px gray;
      }

      .span1 {
        align-items: center;
        margin: 0 25px;
      }

      .span2 {
        margin: 0 3vw;
      }

      .addinput{
        border: none;
        width: 6vw;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .title {
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 1.5rem;
        margin-left: 1vw;
        border: none;
        background-color: transparent;
        width: 21.5vw;
        height: inherit;
        align-items: center;
    
    }

    </style>
  </head>
  <body>
    <div class="header">
      <a href="" class="a1">PROFILE</a>
      <a href="" class="a2">HOME</a>
    </div>
    <div class="main">
      <div class="backgroundopen">
        <div class="containeropen2">
            <input type="text" class="title" placeholder="Workout Title..." required/>
            <button class="Addopen1">-</button>
            <button class="Addopen">Add+</button>
        </div>
        <div class="text">
          <span class="span2">Exercise</span>
          <span class="span2">Sets</span>
          <span class="span2">Reps</span>
          <span class="span2">Kg</span>
        </div>
        <div class="containeropen">
          <div class="componentbaropen">
            <input type="text" id="exercise" class="addinput" placeholder="Exercise..."/>
            <input type="text" id="sets" class="addinput" placeholder="Sets..." />
            <input type="text" id="reps" class="addinput" placeholder="Reps..." />
            <input type="text" id="kg" class="addinput" placeholder="Kg..." />
          </div>
        </div>
        <button class="Addopen" style="margin-left: 15vw; margin-top: 1.2vh;">Save</button>
      </div>
    </div>
  </body>
</html>
